<!doctype html>
<html lang="en">
  <head>
    <title>Maintenance Alert !</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ==========================
   GLOBAL
========================== */

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: "Quicksand", sans-serif;
        overflow-x: hidden;
        color: #fff;
        background: linear-gradient(to bottom, #0d0b61, #294669);
      }

      p {
        font-family: "Oxygen", sans-serif;
        line-height: 1.8;
        margin-bottom: 0;
      }

      /* ==========================
   PARTICLES
========================== */

      #particles-js {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      /* ==========================
   CONTAINER
========================== */

      .container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 40px 20px 80px;
      }

      .row {
        align-items: center;
      }

      /* ==========================
   LOGO
========================== */

      /* .logo {
    max-width: 350px !important;
    width: 100%;
} */

      .description {
        max-width: 520px;
        font-size: 18px;
      }

      /* ==========================
   ROCKET
========================== */

      .img-rocket {
        max-width: 550px;
        width: 100%;
        display: block;
        margin: auto;
        transform: rotate(-18deg);
      }

      /* ==========================
   FOOTER
========================== */

      footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 20px;

        text-align: center;
        color: rgba(255, 255, 255, 0.9);

        /* border-top: 1px solid rgba(255,255,255,.15); */

        padding-top: 15px;
      }

      footer p {
        margin: 0;
      }

      /* ==========================
   TABLET
========================== */

      @media (max-width: 992px) {
        .container {
          padding-top: 60px;
          padding-bottom: 100px;
        }

        h1 {
          font-size: 5rem;
        }

        h2 {
          font-size: 2rem;
        }

        .img-rocket {
          max-width: 420px;
          margin-top: 30px;
        }
      }

      /* ==========================
   MOBILE
========================== */

      @media (max-width: 912px) {
        .container {
          justify-content: flex-start;
          text-align: center;
          padding: 30px 20px 90px;
        }

        .logo {
          max-width: 250px;
          margin: 0 auto 25px;
        }

        h1 {
          font-size: 75pt !important;
          font-weight: bold !important;
          text-align: center !important;
          margin-bottom: 0 !important;
        }

        h2 {
          font-size: 40pt !important;
          text-align: center !important;
        }

        .description {
          max-width: 100%;
          font-size: 15px;
        }

        .img-rocket {
          max-width: 350px !important;
          margin-top: 35px;
          transform: rotate(-15deg);
        }

        footer {
          position: relative;
          bottom: auto;
          margin-top: 30px;
          padding-top: 15px;
        }
      }

      /* ==========================
   EXTRA SMALL
========================== */

      @media (max-width: 480px) {
        .container {
          padding: 20px 16px 60px;
        }

        .logo {
          max-width: 220px;
        }

        h1 {
          font-size: 45pt !important;
          font-weight: 700 !important;
          text-align: center !important;
          margin-bottom: 0 !important;
        }

        h2 {
          font-size: 30pt !important;
          text-align: center !important;
        }

        .description {
          font-size: 14px;
        }

        .img-rocket {
          max-width: 200px;
        }

        footer {
          font-size: 12px;
        }
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(to bottom, #0d0b61, #294669);
        overflow: hidden;
      }

      .img-rocket {
        transform: rotate(0deg);
      }

      /* ==========================
        TEXT
      ========================== */
      @media (min-width: 992px) {
        .container {
          padding-top: 60px;
          padding-bottom: 100px;
        }

        h1 {
          font-size: 70pt !important;
          line-height: 1;
          font-weight: 700 !important;
          margin-bottom: 0 !important;
        }

        h2 {
          font-size: 45pt !important;
          font-weight: 700 !important;
          margin-bottom: 20px;
        }
      }

      .img-rocket {
        max-width: 370px;
        animation: floating 4s ease-in-out infinite;
      }

      @keyframes floating {
        0% {
          transform: translateY(0px) rotate(1deg);
        }

        50% {
          transform: translateY(-18px) rotate(-5deg);
        }

        100% {
          transform: translateY(0px) rotate(1deg);
        }
      }

      p,
      h1,
      h2 {
        color: white;
      }

      .container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .container > .row {
        flex: 1;
      }

      footer {
        position: absolute;
        bottom: 10px;
        left: 0;
        width: 100%;
        text-align: center;
        color: white;
        /* border-top: 1px solid rgba(244, 244, 244, 0.2); */
        padding-top: 15px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div id="particles-js"></div>

    <div class="container">
      <div class="row d-flex justify-content-center align-items-center">
        <div class="col-lg-7 col-12">
          <div class="row">
            <div class="col-12">
              <img
                src="bulelengkab.webp"
                alt="img-bulelengkab"
                class="img-fluid logo"
              />
            </div>
          </div>
          <h1>UNDER</h1>
          <h2>CONSTRUCTION</h2>
          <p>
            Website sedang dalam proses migrasi server dan pemeliharaan sistem
            guna meningkatkan kualitas, keamanan, dan keandalan layanan.
          </p>
        </div>
        <div class="col-lg-4 col-12">
          <img
            src="rocket.webp"
            alt="rocket image"
            class="img-fluid img-rocket"
          />
        </div>
      </div>
    </div>
    <footer>
      <p class="copyright h6">
        ©<span id="year-copyright"></span> Pemerintah Kabupaten Buleleng
      </p>
    </footer>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const year = document.getElementById("year-copyright");
        year.textContent = new Date().getFullYear();
      });

      particlesJS("particles-js", {
        particles: {
          number: { value: 150 },
          color: { value: "#ffffff" },
          shape: { type: "circle" },
          opacity: {
            value: 0.7,
            random: true,
            anim: {
              enable: true,
              speed: 0.1,
              opacity_min: 0.4,
              sync: false,
            },
          },
          size: {
            value: 4,
            random: true,
          },
          line_linked: { enable: false },
          move: {
            enable: true,
            speed: 1,
            random: true,
          },
        },
        interactivity: {
          detect_on: "window",
          events: {
            onhover: { enable: true, mode: "bubble" },
          },
          modes: {
            bubble: {
              distance: 100,
              size: 5,
              opacity: 1,
            },
          },
        },
      });
    </script>
  </body>
</html>
